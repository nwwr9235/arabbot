version: "3.9"

services:

  # ─── بوت الإدارة ───────────────────────────────────────────────
  admin_bot:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: arabbot_admin
    restart: unless-stopped
    env_file: .env
    environment:
      # عنوان بوت الموسيقى داخل Docker network
      MUSIC_API_URL: "http://music_bot:8000"
    depends_on:
      - music_bot
    networks:
      - arabbot_net

  # ─── بوت الموسيقى ──────────────────────────────────────────────
  music_bot:
    build:
      context: .
      dockerfile: Dockerfile.music
    container_name: arabbot_music
    restart: unless-stopped
    env_file: .env
    environment:
      MUSIC_API_PORT: "8000"
    ports:
      # لا تعرّض المنفذ خارجياً في الإنتاج — داخلي فقط
      - "127.0.0.1:8000:8000"
    networks:
      - arabbot_net
    volumes:
      - music_cache:/tmp/music

networks:
  arabbot_net:
    driver: bridge

volumes:
  music_cache:
